<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智能客服管理后台</title>
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-hero">
        <p class="eyebrow">Support Console</p>
        <h1>知识库与人工转接规则</h1>
        <p>维护 FAQ 答案、同义关键词和转人工触发词，保存后聊天接口会即时生效。</p>
      </header>

      <section class="panel token-panel">
        <label>
          管理 Token（如已配置）
          <input id="adminToken" type="password" autocomplete="off" placeholder="x-admin-token" />
        </label>
        <button id="reloadData" type="button">重新加载</button>
        <small id="statusText">准备就绪</small>
      </section>

      <section class="grid">
        <form id="faqForm" class="panel">
          <h2>FAQ 条目</h2>
          <input id="faqIntent" required placeholder="intent，例如 refund_time" />
          <input id="faqQuestion" required placeholder="标准问题，例如 退款多久到账？" />
          <input id="faqKeywords" placeholder="关键词，用逗号分隔" />
          <textarea id="faqAnswer" required rows="5" placeholder="答案"></textarea>
          <button type="submit">保存 FAQ</button>
        </form>

        <form id="settingsForm" class="panel">
          <h2>人工转接规则</h2>
          <textarea id="humanKeywords" rows="5" placeholder="关键词，用逗号分隔"></textarea>
          <textarea id="fallbackReply" required rows="4" placeholder="兜底回复"></textarea>
          <button type="submit">保存规则</button>
        </form>
      </section>

      <section class="panel">
        <h2>当前 FAQ</h2>
        <div id="faqList" class="faq-list"></div>
      </section>
    </main>

    <script src="/static/admin.js"></script>
  </body>
</html>
